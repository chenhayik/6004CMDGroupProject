name: CI/CD

# Run the quality gate on every push to main and every PR into main.
# Build the APK only after tests pass on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allows a manual run from the Actions tab

# Cancel an in-progress run if new commits are pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gate: static analysis + unit tests ──
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (lints + type checks)
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ── Delivery: build a release APK and publish it as an artifact ──
  build:
    name: Build Android APK
    needs: test # only build if the quality gate passed
    if: github.event_name != 'pull_request' # skip on PRs to save CI minutes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" # build.gradle.kts targets Java 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nutrifit-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
