name: mobile_application_group
description: "NutriFit - Smart Nutrition & Fitness Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  # Using the newer minimum SDK constraint while explicitly capping it below 4.0.0
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase Core & Platform Overrides
  firebase_core: ^3.1.1
  firebase_core_platform_interface: 5.3.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1

  # AI Capabilities
  google_generative_ai: ^0.4.6

  # Device Hardware & Permissions
  image_picker: ^1.1.2
  pedometer: ^4.0.0
  permission_handler: ^11.3.0

  # Launch external apps / URLs (YouTube how-to videos)
  url_launcher: ^6.3.1

  # Local Persistence & Utilities
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  form_validator: ^2.1.1
  fl_chart: ^1.2.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  workmanager: ^0.9.0+3
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Adopted the newer linting standard configuration
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true